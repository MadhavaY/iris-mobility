<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>IRIS Mobility — AI traffic intelligence for safer streets</title>
<link rel="icon" href="assets/logo.png"/>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..500;1,9..144,300..400&family=Inter+Tight:wght@300..600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
/* IRIS Mobility — light, editorial, Flock-inspired */
:root {
  /* cream/paper palette */
  --bg: #F5F1EA;
  --bg-2: #EFE9DF;
  --paper: #FFFDF8;
  --ink: #13140F;
  --ink-2: #2A2B24;
  --ink-dim: #5E5F56;
  --ink-mute: #8A8B81;
  --line: #1f1f1a1a;
  --line-2: #1f1f1a22;
  --line-3: #1f1f1a44;

  /* accents — muted, Flock-y */
  --green: #2F4A3A;     /* deep forest */
  --green-2: #4E7A5C;   /* mid */
  --rust: #B14A2B;      /* signal red/rust */
  --amber: #C79A3A;     /* muted amber */
  --sky: #4F7A99;       /* calm blue */

  --sans: 'Inter Tight', ui-sans-serif, system-ui, -apple-system, sans-serif;
  --serif: 'Fraunces', 'Times New Roman', serif;
  --mono: 'JetBrains Mono', ui-monospace, monospace;
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--ink);
  font-family: var(--sans);
  -webkit-font-smoothing: antialiased;
  line-height: 1.5;
  overflow-x: hidden;
}

.wrap { position: relative; z-index: 1; }
img { max-width: 100%; display: block; }

/* ============ NAV ============ */
.nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 60;
  padding: 14px 28px;
  display: flex; align-items: center; justify-content: space-between;
  backdrop-filter: blur(14px) saturate(140%);
  background: rgba(245, 241, 234, 0.78);
  border-bottom: 1px solid var(--line);
}
.nav-left { display: flex; align-items: center; gap: 40px; }
.logo { display: flex; align-items: center; gap: var(--logo-gap, 12px); font-weight: 600; font-size: var(--brand-size, 18px); letter-spacing: -0.01em; color: var(--ink); text-decoration: none; }
.logo img { width: var(--logo-size, 36px); height: var(--logo-size, 36px); object-fit: contain; }
.nav-links { display: flex; gap: 28px; font-size: 14px; color: var(--ink-2); white-space: nowrap; }
.nav-links a { color: inherit; text-decoration: none; transition: color .15s; }
.nav-links a:hover { color: var(--green); }
.nav-right { display: flex; align-items: center; gap: 10px; }
.btn {
  font-family: var(--sans); font-size: 14px; font-weight: 500;
  padding: 10px 18px; border-radius: 999px; border: 1px solid var(--line-3);
  background: transparent; color: var(--ink); cursor: pointer;
  transition: all .15s; text-decoration: none; display: inline-flex; align-items: center; gap: 8px;
  white-space: nowrap;
}
.btn:hover { background: rgba(19,20,15,0.04); }
.btn-primary {
  background: var(--ink); color: var(--paper);
  border-color: var(--ink);
}
.btn-primary:hover { background: var(--green); border-color: var(--green); color: var(--paper); }
.btn-arrow { transition: transform .15s; }
.btn:hover .btn-arrow { transform: translateX(3px); }

/* ============ HERO ============ */
.hero {
  padding: 120px 44px 60px;
  position: relative;
  min-height: 92vh;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 64px;
  align-items: center;
  max-width: 1640px;
  margin: 0 auto;
}
.hero-copy { max-width: none; padding-right: 20px; }
.eyebrow {
  font-family: var(--mono);
  font-size: 11px; letter-spacing: 0.16em;
  color: var(--ink-dim); text-transform: uppercase;
  display: inline-flex; align-items: center; gap: 10px;
}
.eyebrow::before { content: ""; width: 22px; height: 1px; background: var(--ink-dim); }

.hero-title {
  font-family: var(--serif);
  font-size: clamp(44px, 6vw, 84px);
  font-weight: 350;
  letter-spacing: -0.025em;
  line-height: 1.02;
  margin: 20px 0 0;
  color: var(--ink);
}
.hero-title em {
  font-style: italic;
  font-weight: 300;
  color: var(--green);
}
.hero-sub {
  font-size: 19px; color: var(--ink-2);
  max-width: 540px; margin-top: 24px; line-height: 1.5;
  font-family: var(--sans);
}
.hero-cta { display: flex; gap: 12px; margin-top: 32px; flex-wrap: wrap; align-items: center; }
.hero-meta {
  display: flex; gap: 28px; margin-top: 48px;
  padding-top: 28px; border-top: 1px solid var(--line);
}
.meta-item { }
.meta-num {
  font-family: var(--serif);
  font-size: 34px; font-weight: 350; letter-spacing: -0.02em; color: var(--ink);
  line-height: 1;
}
.meta-num em { font-style: italic; color: var(--green); }
.meta-label {
  font-size: 12px; color: var(--ink-dim); margin-top: 6px;
  max-width: 160px; line-height: 1.3;
}

/* Hero right: intersection */
.hero-vis { position: relative; }

/* ============ Intersection (real top-down) ============ */
.isx-card {
  position: relative;
  aspect-ratio: 1 / 1;
  border-radius: 16px;
  overflow: hidden;
  background: #8B9387;
  border: 1px solid var(--line-2);
  box-shadow: 0 30px 80px rgba(19, 20, 15, 0.18), 0 2px 0 rgba(255,255,255,0.4) inset;
}
.isx-label {
  position: absolute; top: 14px; left: 16px;
  font-family: var(--mono); font-size: 11px; color: var(--paper);
  background: rgba(19,20,15,0.78);
  padding: 6px 10px; border-radius: 6px;
  letter-spacing: 0.06em;
  display: flex; align-items: center; gap: 8px;
  z-index: 5;
}
.isx-label .dot { width: 7px; height: 7px; border-radius: 50%; background: #7FC089; box-shadow: 0 0 8px #7FC089; animation: pulse 1.6s infinite; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .45; } }

.isx-tag {
  position: absolute; top: 14px; right: 16px;
  font-family: var(--mono); font-size: 10px;
  color: var(--ink); background: var(--paper);
  padding: 6px 10px; border-radius: 6px;
  letter-spacing: 0.06em;
  border: 1px solid var(--line);
  z-index: 5;
}

.isx-svg { position: absolute; inset: 0; width: 100%; height: 100%; display: block; }

.isx-hud {
  position: absolute;
  bottom: 14px; left: 14px; right: 14px;
  display: flex; gap: 8px;
  z-index: 6;
}
.isx-hud-card {
  flex: 1;
  background: rgba(255, 253, 248, 0.94);
  backdrop-filter: blur(8px);
  border: 1px solid var(--line);
  border-radius: 10px;
  padding: 10px 12px;
}
.isx-hud-card .label {
  font-family: var(--mono); font-size: 9px; color: var(--ink-dim);
  text-transform: uppercase; letter-spacing: 0.08em;
}
.isx-hud-card .val {
  font-family: var(--serif); font-size: 22px; font-weight: 400;
  color: var(--ink); letter-spacing: -0.02em; line-height: 1.1; margin-top: 2px;
}
.isx-hud-card .val em { font-style: italic; color: var(--green); font-weight: 400; }
.isx-hud-card .unit { font-family: var(--sans); font-size: 11px; color: var(--ink-dim); margin-left: 3px; }

/* ============ Marquee ============ */
.marquee {
  padding: 22px 0;
  border-top: 1px solid var(--line);
  border-bottom: 1px solid var(--line);
  overflow: hidden;
  background: var(--bg-2);
}
.marquee-inner { display: flex; gap: 72px; animation: marquee 36s linear infinite; padding-left: 72px; white-space: nowrap; }
@keyframes marquee { from { transform: translateX(0); } to { transform: translateX(-50%); } }
.city-badge {
  display: inline-flex; align-items: center; gap: 12px;
  color: var(--ink-2);
  font-family: var(--serif);
  font-weight: 400;
  font-size: 20px;
  letter-spacing: -0.01em;
  flex-shrink: 0;
}
.city-badge em { font-style: italic; color: var(--ink-dim); }
.city-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); flex-shrink: 0; }

/* ============ SECTIONS ============ */
section { position: relative; padding: 120px 28px; }
.container { max-width: 1320px; margin: 0 auto; }
.section-eyebrow { composes: eyebrow; }
.section-title {
  font-family: var(--serif);
  font-size: clamp(36px, 4.6vw, 64px);
  font-weight: 350;
  letter-spacing: -0.025em;
  line-height: 1.04;
  margin: 16px 0 0;
  max-width: 920px;
  color: var(--ink);
}
.section-title em {
  font-style: italic;
  color: var(--green);
  font-weight: 300;
}
.section-sub {
  font-size: 18px;
  color: var(--ink-2);
  margin-top: 20px;
  max-width: 620px;
  line-height: 1.5;
}

/* Positioning (Sit on top) */
.position-section { background: var(--paper); }
.position-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 56px;
  margin-top: 56px; align-items: center;
}
.position-diagram {
  background: var(--bg-2);
  border-radius: 18px;
  padding: 28px;
  border: 1px solid var(--line);
  aspect-ratio: 4 / 3;
  display: flex; flex-direction: column; gap: 0;
  position: relative;
}
.pd-row {
  flex: 1;
  display: flex; align-items: center; gap: 14px;
  padding: 16px 18px;
  position: relative;
}
.pd-row + .pd-row { border-top: 1px dashed var(--line-2); }
.pd-label {
  font-family: var(--mono); font-size: 10px; text-transform: uppercase;
  color: var(--ink-dim); letter-spacing: 0.08em;
  width: 90px;
}
.pd-content {
  flex: 1;
  border: 1px solid var(--line-2);
  border-radius: 10px;
  padding: 12px 16px;
  background: var(--paper);
  font-size: 15px; color: var(--ink);
  font-weight: 500;
}
.pd-content.iris {
  background: var(--ink);
  color: var(--paper);
  border-color: var(--ink);
  display: flex; align-items: center; justify-content: space-between;
  font-family: var(--serif);
  font-weight: 400;
  font-size: 20px;
  letter-spacing: -0.01em;
}
.pd-content.iris em { font-style: italic; color: #D9CBA2; }
.pd-content.iris .iris-mark { width: 22px; height: 22px; opacity: 0.9; filter: invert(1); }
.pd-flow-arrow {
  position: absolute;
  left: 50%; transform: translateX(-50%);
  font-family: var(--mono); font-size: 10px;
  color: var(--ink-dim);
}

.position-copy .feature {
  display: grid; grid-template-columns: 30px 1fr; gap: 18px;
  padding: 22px 0;
  border-top: 1px solid var(--line);
}
.position-copy .feature:last-child { border-bottom: 1px solid var(--line); }
.feature-num {
  font-family: var(--mono); font-size: 11px; color: var(--green);
  letter-spacing: 0.06em; padding-top: 3px;
}
.feature-title {
  font-family: var(--serif); font-size: 22px; font-weight: 400; letter-spacing: -0.01em;
  margin: 0 0 6px;
}
.feature-desc { color: var(--ink-2); font-size: 15px; line-height: 1.5; margin: 0; }

/* Capabilities */
.cap-section { background: var(--bg); }
.cap-grid {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px;
  margin-top: 48px;
}
.cap-card {
  background: var(--paper);
  padding: 26px 22px 22px;
  border: 1px solid var(--line);
  border-radius: 14px;
  position: relative;
  display: flex; flex-direction: column; gap: 0;
  transition: all .25s;
  min-height: 280px;
}
.cap-card:hover {
  background: #fff;
  border-color: var(--line-3);
  transform: translateY(-2px);
  box-shadow: 0 10px 30px rgba(19,20,15,0.06);
}
.cap-visual {
  height: 110px; margin-bottom: 14px;
  display: flex; align-items: center; justify-content: flex-start;
}
.cap-num {
  font-family: var(--mono); font-size: 10px; color: var(--ink-mute);
  letter-spacing: 0.1em;
}
.cap-title {
  font-family: var(--serif);
  font-size: 22px; font-weight: 400; letter-spacing: -0.015em;
  margin: 8px 0 8px; line-height: 1.15; color: var(--ink);
}
.cap-desc { color: var(--ink-2); font-size: 14px; flex: 1; line-height: 1.5; }

/* Dashboard */
.dash-section { background: var(--paper); }
.dash-stage {
  margin-top: 48px;
  border: 1px solid var(--line);
  border-radius: 16px;
  background: var(--bg);
  padding: 18px;
  box-shadow: 0 30px 80px rgba(19,20,15,0.08);
  position: relative;
  overflow: hidden;
}
.dash-chrome {
  display: flex; justify-content: space-between; align-items: center;
  padding: 8px 10px 14px; border-bottom: 1px solid var(--line);
  margin-bottom: 18px;
}
.dash-chrome-left { display: flex; align-items: center; gap: 12px; font-family: var(--mono); font-size: 12px; color: var(--ink-2); }
.dash-live-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green-2); box-shadow: 0 0 8px rgba(79,122,92,0.5); animation: pulse 1.6s infinite; }
.dash-tabs { display: flex; gap: 6px; }
.dash-tab {
  font-family: var(--mono); font-size: 11px; padding: 6px 11px;
  border-radius: 999px; border: 1px solid transparent;
  color: var(--ink-dim); cursor: pointer;
}
.dash-tab.active { background: var(--paper); color: var(--ink); border-color: var(--line); }

.dash-grid {
  display: grid;
  grid-template-columns: 1.3fr 1fr 1fr;
  gap: 12px;
}
.dash-panel {
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: 12px;
  padding: 16px 18px;
}
.dash-panel h4 {
  font-family: var(--mono); font-size: 10px; color: var(--ink-dim);
  text-transform: uppercase; letter-spacing: 0.08em;
  margin: 0 0 14px; font-weight: 500;
  display: flex; justify-content: space-between; align-items: center;
}
.dash-panel h4 .pill {
  background: var(--green); color: var(--paper);
  padding: 2px 7px; border-radius: 10px; font-size: 9px; letter-spacing: 0.05em;
}
.dash-panel.full { grid-column: 1 / -1; }
.dash-panel .big {
  font-family: var(--serif); font-size: 38px; font-weight: 350; letter-spacing: -0.025em;
  color: var(--ink); line-height: 1;
}
.dash-panel .big em { font-style: italic; color: var(--green); }
.dash-panel .sub {
  font-size: 12px; color: var(--ink-dim); margin-top: 4px;
}
.delta-good { color: var(--green); font-family: var(--mono); font-size: 11px; }
.delta-bad { color: var(--rust); font-family: var(--mono); font-size: 11px; }

/* Heatmap */
.heatmap {
  display: grid; grid-template-columns: repeat(24, 1fr);
  gap: 2px;
}
.heat-cell { border-radius: 2px; aspect-ratio: 1/1; transition: transform .15s; }
.heat-cell:hover { transform: scale(1.4); }

.bars { display: flex; align-items: flex-end; gap: 4px; height: 130px; }
.bar { flex: 1; border-radius: 3px 3px 0 0; background: var(--green-2); }
.bar.hot { background: var(--rust); }

/* Feed */
.feed-item {
  display: grid; grid-template-columns: auto 1fr auto;
  gap: 12px; align-items: center;
  padding: 10px 0;
  border-bottom: 1px solid var(--line);
  font-size: 13px;
  color: var(--ink);
}
.feed-item:last-child { border-bottom: none; }
.feed-time { font-family: var(--mono); font-size: 11px; color: var(--ink-mute); }
.feed-tag {
  font-family: var(--mono); font-size: 10px; padding: 3px 8px;
  border-radius: 999px; text-transform: uppercase; letter-spacing: 0.06em;
  border: 1px solid;
}
.feed-tag.red { color: var(--rust); border-color: var(--rust); background: #F7E5DA; }
.feed-tag.amber { color: var(--amber); border-color: var(--amber); background: #FAEFD0; }

/* Reports */
.reports-section { background: var(--bg-2); }
.reports-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 56px;
  margin-top: 56px; align-items: center;
}
.report-mock {
  background: var(--paper);
  border-radius: 14px;
  border: 1px solid var(--line);
  padding: 32px 36px;
  box-shadow: 0 20px 60px rgba(19,20,15,0.08);
  font-family: var(--serif);
  position: relative;
  transform: rotate(-1.5deg);
}
.report-mock.back {
  position: absolute;
  inset: -8px -8px auto auto;
  width: 85%;
  transform: rotate(2deg);
  z-index: 0;
  opacity: 0.75;
  height: 96%;
  background: #EADFCC;
}
.report-stack { position: relative; }

.report-mock .rm-head {
  display: flex; justify-content: space-between; align-items: flex-start;
  padding-bottom: 18px; border-bottom: 1px solid var(--line-2); margin-bottom: 20px;
}
.rm-title { font-size: 26px; font-weight: 400; letter-spacing: -0.02em; line-height: 1.1; }
.rm-title em { font-style: italic; color: var(--green); }
.rm-meta { font-family: var(--mono); font-size: 10px; color: var(--ink-dim); text-align: right; }
.rm-metrics { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; margin-bottom: 22px; }
.rm-metric .n { font-family: var(--serif); font-size: 32px; font-weight: 350; letter-spacing: -0.02em; line-height: 1; }
.rm-metric .n em { font-style: italic; color: var(--green); }
.rm-metric .l { font-family: var(--sans); font-size: 11px; color: var(--ink-dim); margin-top: 6px; }
.rm-section { margin-top: 16px; }
.rm-section h5 { font-family: var(--mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--ink-dim); margin: 0 0 10px; font-weight: 500; }
.rm-chart { height: 54px; display: flex; align-items: flex-end; gap: 4px; }
.rm-chart span { flex: 1; background: var(--green-2); border-radius: 2px 2px 0 0; opacity: 0.9; }
.rm-chart span:nth-child(even) { background: var(--green); }
.rm-bullets { font-family: var(--sans); font-size: 13px; color: var(--ink-2); line-height: 1.5; }
.rm-bullets li { margin: 4px 0; }

/* Timeline / How */
.how-section { background: var(--paper); }
.how-steps {
  display: grid; grid-template-columns: repeat(4, 1fr);
  gap: 0;
  margin-top: 56px;
  border-top: 1px solid var(--line);
}
.how-step {
  padding: 36px 26px;
  border-right: 1px solid var(--line);
  position: relative;
}
.how-step:last-child { border-right: none; }
.how-num {
  font-family: var(--mono); font-size: 11px; color: var(--green);
  letter-spacing: 0.08em;
}
.how-title {
  font-family: var(--serif);
  font-size: 22px; font-weight: 400; letter-spacing: -0.01em;
  margin: 12px 0 10px;
}
.how-desc { color: var(--ink-2); font-size: 14px; line-height: 1.5; margin: 0; }

/* CTA */
.cta-section {
  text-align: center;
  padding: 140px 28px;
  background: var(--ink);
  color: var(--paper);
  position: relative; overflow: hidden;
}
.cta-eyebrow {
  font-family: var(--mono); font-size: 11px; letter-spacing: 0.16em;
  color: #D9CBA2; text-transform: uppercase;
  display: inline-flex; align-items: center; gap: 10px;
}
.cta-eyebrow::before { content: ""; width: 22px; height: 1px; background: #D9CBA2; }
.cta-title {
  font-family: var(--serif);
  font-size: clamp(44px, 6vw, 80px);
  font-weight: 300; letter-spacing: -0.025em; line-height: 1.02;
  max-width: 900px; margin: 20px auto 0;
}
.cta-title em { font-style: italic; color: #D9CBA2; }
.cta-sub { font-size: 18px; color: #C9C7BB; max-width: 540px; margin: 22px auto 0; }
.cta-actions { margin-top: 34px; display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
.cta-section .btn { border-color: rgba(255,253,248,0.18); color: var(--paper); }
.cta-section .btn:hover { background: rgba(255,253,248,0.08); }
.cta-section .btn-primary { background: var(--paper); color: var(--ink); border-color: var(--paper); }
.cta-section .btn-primary:hover { background: #D9CBA2; color: var(--ink); border-color: #D9CBA2; }

/* Footer */
footer {
  border-top: 1px solid var(--line);
  padding: 56px 28px 32px;
  background: var(--bg);
}
.foot-grid { max-width: 1320px; margin: 0 auto; display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; gap: 48px; }
.foot-col h5 { font-family: var(--mono); font-size: 10px; text-transform: uppercase; color: var(--ink-dim); letter-spacing: 0.1em; margin: 0 0 16px; font-weight: 500; }
.foot-col ul { list-style: none; padding: 0; margin: 0; }
.foot-col li { margin: 9px 0; }
.foot-col a { color: var(--ink-2); text-decoration: none; font-size: 14px; }
.foot-col a:hover { color: var(--green); }
.foot-brand { max-width: 320px; font-size: 14px; color: var(--ink-dim); line-height: 1.5; }
.foot-bottom {
  max-width: 1320px; margin: 48px auto 0;
  border-top: 1px solid var(--line); padding-top: 22px;
  display: flex; justify-content: space-between; font-family: var(--mono); font-size: 11px; color: var(--ink-mute);
}

/* Responsive */
@media (max-width: 900px) {
  .hero { grid-template-columns: 1fr; min-height: auto; padding-top: 100px; }
  .hero-vis { order: -1; max-width: 520px; margin: 0 auto; }
  .cap-grid { grid-template-columns: repeat(2, 1fr); }
  .dash-grid { grid-template-columns: 1fr 1fr; }
  .dash-panel.wide { grid-column: 1 / -1; }
  .position-grid, .reports-grid { grid-template-columns: 1fr; gap: 40px; }
  .how-steps { grid-template-columns: 1fr 1fr; }
  .how-step { border-bottom: 1px solid var(--line); }
  .foot-grid { grid-template-columns: 1fr 1fr; gap: 36px; }
}
@media (max-width: 640px) {
  .nav { padding: 12px 18px; }
  .nav-links { display: none; }
  .hero { padding: 96px 18px 24px; }
  section { padding: 72px 18px; }
  .cap-grid { grid-template-columns: 1fr; }
  .dash-grid { grid-template-columns: 1fr; }
  .how-steps { grid-template-columns: 1fr; }
  .how-step { border-right: none; }
  .foot-grid { grid-template-columns: 1fr; }
  .hero-meta { flex-wrap: wrap; gap: 20px; }
}

/* Reveal */
.reveal { opacity: 0; transform: translateY(20px); transition: opacity .8s ease, transform .8s ease; }
.reveal.in { opacity: 1; transform: none; }

/* ========= Print ========= */
@media print {
  @page { size: letter portrait; margin: 0.5in; }

  * {
    -webkit-print-color-adjust: exact !important;
    print-color-adjust: exact !important;
  }

  html, body { background: var(--paper) !important; }

  /* Hide interactive-only chrome */
  .nav { display: none !important; }
  #tweak-panel { display: none !important; }
  .marquee { display: none !important; }

  /* Disable animations and reveal transitions */
  *, *::before, *::after {
    animation: none !important;
    transition: none !important;
  }
  .reveal { opacity: 1 !important; transform: none !important; }

  /* Hero: keep 2 columns on wide paper, stack if narrow */
  .hero {
    padding: 40px 32px 28px !important;
    min-height: auto !important;
    page-break-after: always;
    break-after: page;
    gap: 36px !important;
  }
  .hero-title { font-size: 44px !important; line-height: 1.08 !important; }
  .hero-meta { margin-top: 32px !important; padding-top: 22px !important; }
  .hero-cta { display: none !important; }
  .hero-vis svg { max-width: 100%; height: auto; }

  /* Each section starts on a new page */
  section { padding: 48px 32px !important; break-before: page; page-break-before: always; }
  section:first-of-type { break-before: auto; page-break-before: auto; }

  /* Keep cards / features together */
  .cap-card, .how-step, .feature, .position-diagram,
  .dash-panel, .rm-head, .rm-metric, .report-mock, .feed-item {
    break-inside: avoid;
    page-break-inside: avoid;
  }

  /* Capability grid — 3 cols on paper */
  .cap-grid { grid-template-columns: repeat(3, 1fr) !important; gap: 18px !important; }
  .cap-card { padding: 18px !important; }
  .cap-visual { height: 90px !important; }

  /* Positioning diagram */
  .position-grid { grid-template-columns: 1fr 1fr !important; gap: 32px !important; }

  /* Reports: unstack the rotated mock */
  .report-mock { transform: none !important; box-shadow: 0 1px 2px rgba(19,20,15,0.08) !important; }
  .report-stack .back { display: none !important; }
  .reports-grid { grid-template-columns: 1fr 1fr !important; gap: 36px !important; }

  /* Dashboard: compact */
  .dash-grid { grid-template-columns: repeat(3, 1fr) !important; gap: 12px !important; }
  .dash-panel.wide { grid-column: span 3 !important; grid-row: span 1 !important; }
  .dash-panel.full { grid-column: span 3 !important; }
  .dash-chrome { background: #fff !important; }
  .dash-live-dot { background: #4E9A6F !important; }

  /* How it works: 4 cols */
  .how-steps { grid-template-columns: repeat(4, 1fr) !important; gap: 16px !important; }

  /* CTA */
  .cta-section { padding: 48px 32px !important; }
  .cta-actions { display: none !important; }

  /* Footer */
  footer { padding: 32px !important; break-before: page; page-break-before: always; }
  .foot-grid { grid-template-columns: repeat(4, 1fr) !important; gap: 28px !important; }

  /* Section titles: slightly smaller */
  .section-title { font-size: 32px !important; line-height: 1.15 !important; }

  /* Avoid extra margin */
  .container { padding: 0 !important; }

  /* No sticky */
  .nav { position: static !important; }

  /* Intersection SVG — make sure it prints crisply */
  .hero-vis { max-width: 100% !important; }
}
</style>

    return (

        <text x="18" y="22" fill={green} fontFamily="ui-monospace" fontSize="8">SEDAN · 0.98</text>
        <rect x="82" y="36" width="48" height="28" rx="3" fill={rust}/>
        <rect x="79" y="18" width="54" height="14" fill="none" stroke={amber} strokeDasharray="3 2" strokeWidth="1"/>

        <circle cx="60" cy="82" r="3.5" fill={stroke}/>
        <text x="48" y="78" fill={stroke} fontFamily="ui-monospace" fontSize="7">PED</text>
      </svg>
    );

  if (kind === 'speed') {
    return (
      <svg viewBox="0 0 160 100" width="160" height="100">
        <path d="M 30 80 A 40 40 0 0 1 130 80" fill="none" stroke="#e5e0d1" strokeWidth="5"/>
        <path d="M 30 80 A 40 40 0 0 1 108 52" fill="none" stroke={green} strokeWidth="5" strokeLinecap="round"/>
        <line x1="80" y1="80" x2="104" y2="58" stroke={stroke} strokeWidth="2"/>

        <text x="80" y="95" textAnchor="middle" fill={stroke} fontFamily="Fraunces" fontSize="16" fontStyle="italic">31 mph</text>
      </svg>
    );
  }
  if (kind === 'near') {
    return (
      <svg viewBox="0 0 160 100" width="160" height="100">
        <rect x="12" y="42" width="36" height="18" rx="2" fill={sky}/>
        <rect x="100" y="52" width="18" height="36" rx="2" fill={rust}/>
        <path d="M 52 55 L 98 62" stroke={rust} strokeWidth="1.5" strokeDasharray="3 3"/>

      </svg>
    );
  }
  if (kind === 'ped') {
    return (
      <svg viewBox="0 0 160 100" width="160" height="100">
        {[...Array(6)].map((_,i)=>(
          <rect key={i} x={30 + i*10} y="30" width="5" height="40" fill="#e5e0d1"/>
        ))}
        <circle cx="110" cy="40" r="4" fill={stroke}/>
        <path d="M 110 45 L 110 60 M 106 52 L 114 52 M 106 68 L 110 60 L 114 68" stroke={stroke} strokeWidth="1.5" fill="none"/>
        <rect x="96" y="24" width="30" height="48" fill="none" stroke={green} strokeWidth="1" strokeDasharray="3 2"/>
      </svg>
    );
  }
  if (kind === 'signal') {
    return (
      <svg viewBox="0 0 160 100" width="160" height="100">
        <rect x="65" y="20" width="30" height="60" rx="4" fill={stroke}/>
        <circle cx="80" cy="33" r="6" fill={rust}/>
        <circle cx="80" cy="50" r="6" fill="#3a3a33"/>

      </svg>
    );
  }
  if (kind === 'heat') {
    return (
      <svg viewBox="0 0 160 100" width="160" height="100">
        {[...Array(42)].map((_,i)=>{
          const r = Math.floor(i/7), c = i%7;
          const v = Math.sin(r*1.3 + c*0.9) * 0.5 + 0.5;

          if (v > 0.3) fill = "#C4D1B8";

// Top-down real intersection with camera sensors at 4 corners, detection arcs,
// and bounding boxes on moving vehicles. Pure SVG — no 3D perspective hacks.

function Intersection() {
  const [phase, setPhase] = React.useState('NS'); // NS or EW green
  const [tick, setTick] = React.useState(0);
  const [t, setT] = React.useState(0); // time in seconds for animation

  React.useEffect(() => {
    const seq = ['NS', 'NS_YEL', 'EW', 'EW_YEL'];
    const dur = { NS: 5000, NS_YEL: 1400, EW: 5000, EW_YEL: 1400 };
    let i = 0;
    const advance = () => {
      setPhase(seq[i]);
      setTimeout(() => { i = (i + 1) % seq.length; advance(); }, dur[seq[i]]);
    };
    advance();
  }, []);

  React.useEffect(() => {
    const id = setInterval(() => setTick(v => v + 1), 1600);
    return () => clearInterval(id);
  }, []);

  // requestAnimationFrame loop for vehicle positions
  React.useEffect(() => {
    let raf, start = performance.now();
    const loop = (now) => {
      setT((now - start) / 1000);
      raf = requestAnimationFrame(loop);
    };
    raf = requestAnimationFrame(loop);

        {/* Vehicles — US right-hand drive.
             SB (going south ↓) travels in west half (x=270 outer, 285 inner). Stops at y=234.
             NB (going north ↑) travels in east half (x=315 inner, 330 outer). Stops at y=366.
             EB (going east →) travels in south half (y=315 inner, 330 outer). Stops at x=366 when red. Wait — EB goes through, so EB stops BEFORE entering, at west edge x=234.

        */}
        {nsGo ? (
          <>
            <Car dir="S" lane={270} t={t} offset={0} color="#e0ddce"/>

function Block({ x, y, w, h, variant }) {
  const palette = {
    a: { fill: '#D4C8A8', roof: '#BFB38E' },
    b: { fill: '#CFC4B1', roof: '#B9AE9A' },
    c: { fill: '#B9AE95', roof: '#A39882' },
  }[variant];
  return (
    <g>
      <rect x={x} y={y} width={w} height={h} fill={palette.fill}/>
      {/* subtle inner divisions for visual interest */}
      <rect x={x + 8} y={y + 8} width={w - 16} height={h - 16} fill="none" stroke={palette.roof} strokeWidth="0.8" opacity="0.6"/>
      {variant === 'a' && (
        <>
          <rect x={x + 30} y={y + 30} width={60} height={80} fill={palette.roof} opacity="0.5"/>
          <rect x={x + 110} y={y + 60} width={70} height={120} fill={palette.roof} opacity="0.4"/>
        </>
      )}
      {variant === 'b' && (
        <>
          <rect x={x + 20} y={y + 80} width={160} height={90} fill={palette.roof} opacity="0.45"/>
          <rect x={x + 60} y={y + 20} width={120} height={50} fill={palette.roof} opacity="0.35"/>
        </>
      )}
      {variant === 'c' && (
        <>
          <rect x={x + 40} y={y + 40} width={120} height={120} fill={palette.roof} opacity="0.5"/>
          <circle cx={x + 100} cy={y + 100} r={20} fill={palette.fill}/>
        </>
      )}
      {/* tree */}
      <circle cx={x + w - 14} cy={y + h - 14} r="8" fill="#4E7A5C" opacity="0.9"/>
      <circle cx={x + 14} cy={y + 14} r="7" fill="#4E7A5C" opacity="0.85"/>
    </g>
  );
}

function Crosswalk({ dir, x, y, w, h }) {
  const stripes = 6;
  if (dir === 'h') {
    const sw = (w - 8) / stripes - 2;
    return (
      <g>
        {[...Array(stripes)].map((_, i) => (
          <rect key={i} x={x + 4 + i * (sw + 2)} y={y} width={sw} height={8} fill="#f0ebde" opacity="0.92"/>
        ))}
      </g>
    );
  }
  const sh = (h - 8) / stripes - 2;
  return (
    <g>
      {[...Array(stripes)].map((_, i) => (
        <rect key={i} x={x} y={y + 4 + i * (sh + 2)} width={8} height={sh} fill="#f0ebde" opacity="0.92"/>
      ))}
    </g>
  );
}

function Car({ dir, lane, t, offset, color, detect }) {
  // Car travels from one edge to the other over `duration` seconds
  const duration = 11;
  const progress = ((t + offset) % duration) / duration;

  let x, y, rot;
  if (dir === 'S') { x = lane; y = -30 + progress * 660; rot = 0; }
  else if (dir === 'N') { x = lane; y = 630 - progress * 660; rot = 180; }
  else if (dir === 'E') { x = -30 + progress * 660; y = lane; rot = 90; }
  else { x = 630 - progress * 660; y = lane; rot = 270; }

  return (
    <g transform={`translate(${x} ${y}) rotate(${rot})`}>
      {/* shadow */}
      <rect x="-9" y="-15" width="18" height="30" rx="3" fill="#000" opacity="0.22" transform="translate(1.5 1.5)"/>
      <CarBody color={color}/>
      {detect && (
        <g>
          <rect x="-13" y="-19" width="26" height="38" rx="2" fill="none" stroke="#4E7A5C" strokeWidth="1.2"/>
          {/* corner ticks */}
          <path d="M -13 -14 L -13 -19 L -8 -19" fill="none" stroke="#4E7A5C" strokeWidth="1.8"/>
          <path d="M 13 -14 L 13 -19 L 8 -19" fill="none" stroke="#4E7A5C" strokeWidth="1.8"/>
          <path d="M -13 14 L -13 19 L -8 19" fill="none" stroke="#4E7A5C" strokeWidth="1.8"/>
          <path d="M 13 14 L 13 19 L 8 19" fill="none" stroke="#4E7A5C" strokeWidth="1.8"/>
        </g>
      )}
    </g>
  );
}

function StoppedCar({ dir, lane, x, y, color }) {
  let px = x, py = y, rot = 0;
  if (dir === 'S') { px = lane; rot = 0; }
  else if (dir === 'N') { px = lane; rot = 180; }
  else if (dir === 'E') { py = lane; rot = 90; }
  else { py = lane; rot = 270; }
  return (
    <g transform={`translate(${px} ${py}) rotate(${rot})`}>
      <rect x="-9" y="-15" width="18" height="30" rx="3" fill="#000" opacity="0.22" transform="translate(1.5 1.5)"/>
      <CarBody color={color}/>
    </g>
  );
}

function CarBody({ color }) {
  return (
    <g>
      <rect x="-8.5" y="-14" width="17" height="28" rx="3.5" fill={color}/>
      {/* windshield */}
      <rect x="-6.5" y="-11" width="13" height="8" rx="1.5" fill="#2b3a48" opacity="0.8"/>
      {/* rear window */}
      <rect x="-6.5" y="4" width="13" height="6" rx="1.5" fill="#2b3a48" opacity="0.75"/>
      {/* roof line */}
      <line x1="-8" y1="-3" x2="8" y2="-3" stroke="#00000044" strokeWidth="0.5"/>
      <line x1="-8" y1="3" x2="8" y2="3" stroke="#00000044" strokeWidth="0.5"/>
      {/* headlights */}
      <circle cx="-5" cy="-13" r="1.2" fill="#fff6d8"/>
      <circle cx="5" cy="-13" r="1.2" fill="#fff6d8"/>
      {/* tail */}
      <circle cx="-5" cy="13" r="0.9" fill="#c14228"/>
      <circle cx="5" cy="13" r="0.9" fill="#c14228"/>
    </g>
  );
}

function Pedestrian({ ewGo, t }) {
  // Pedestrian crosses the east sidewalk-to-sidewalk when NS is red (ewGo)
  // they walk north-to-south across the top crosswalk
  if (!ewGo) {
    // Waiting on the curb
    return (
      <g transform="translate(245 225)">
        <circle r="3" fill="#2d2e27"/>
        <circle r="2" cy="-1" fill="#f0d2a8"/>
      </g>
    );
  }
  const progress = ((t % 6) / 6);
  const x = 244 + progress * 112;
  return (
    <g transform={`translate(${x} 234)`}>
      <circle r="3.5" fill="#2d2e27"/>
      <circle r="2.2" cy="-1" fill="#f0d2a8"/>
      <rect x="-14" y="-10" width="28" height="20" fill="none" stroke="#4F7A99" strokeWidth="1.2" rx="1"/>
      <path d="M -14 -5 L -14 -10 L -9 -10" fill="none" stroke="#4F7A99" strokeWidth="1.6"/>
      <path d="M 14 -5 L 14 -10 L 9 -10" fill="none" stroke="#4F7A99" strokeWidth="1.6"/>
      <path d="M -14 5 L -14 10 L -9 10" fill="none" stroke="#4F7A99" strokeWidth="1.6"/>
      <path d="M 14 5 L 14 10 L 9 10" fill="none" stroke="#4F7A99" strokeWidth="1.6"/>
    </g>
  );
}

function CameraUnit({ x, y, rot }) {
  return (
    <g transform={`translate(${x} ${y}) rotate(${rot})`}>
      {/* pole/mount shadow */}
      <circle r="9" fill="#000" opacity="0.25"/>
      {/* arm */}
      <rect x="0" y="-1.8" width="18" height="3.6" fill="#2A2B24" rx="1"/>
      {/* camera housing */}
      <rect x="13" y="-5" width="12" height="10" rx="1.5" fill="#13140F"/>
      {/* lens */}
      <circle cx="25" cy="0" r="2.5" fill="#4F7A99"/>
      <circle cx="25" cy="0" r="1.2" fill="#0a0d13"/>
      {/* rec dot */}
      <circle cx="15" cy="-3" r="0.8" fill="#c14228"/>
    </g>
  );
}

function SignalHead({ x, y, phase, dir }) {
  const red = dir === 'ns' ? (phase === 'EW' || phase === 'EW_YEL') : (phase === 'NS' || phase === 'NS_YEL');
  const yel = dir === 'ns' ? (phase === 'NS_YEL') : (phase === 'EW_YEL');
  const grn = dir === 'ns' ? (phase === 'NS') : (phase === 'EW');
  return (
    <g transform={`translate(${x} ${y})`}>
      <rect x="-4" y="-11" width="8" height="22" rx="1.5" fill="#13140F"/>
      <circle cx="0" cy="-7" r="2.2" fill={red ? '#D9482C' : '#2a2a24'}
        style={{ filter: red ? 'drop-shadow(0 0 3px #D9482C)' : 'none' }}/>
      <circle cx="0" cy="0" r="2.2" fill={yel ? '#E6B23A' : '#2a2a24'}
        style={{ filter: yel ? 'drop-shadow(0 0 3px #E6B23A)' : 'none' }}/>
      <circle cx="0" cy="7" r="2.2" fill={grn ? '#4E9A6F' : '#2a2a24'}
        style={{ filter: grn ? 'drop-shadow(0 0 3px #4E9A6F)' : 'none' }}/>
    </g>
  );
}

window.Intersection = Intersection;

function Donut({ value, tick }) {
  const r = 34, c = 2*Math.PI*r;
  const live = value + ((tick%4)-2);
  const off = c * (1 - live/100);
  return (
    <div style={{display:'flex',alignItems:'center',gap:14}}>
      <svg width="92" height="92" viewBox="0 0 100 100">
        <circle cx="50" cy="50" r={r} fill="none" stroke="#EFE9DF" strokeWidth="8"/>
        <circle cx="50" cy="50" r={r} fill="none" stroke="#2F4A3A" strokeWidth="8"
          strokeDasharray={c} strokeDashoffset={off} strokeLinecap="round"
          transform="rotate(-90 50 50)" style={{transition:'stroke-dashoffset 1s ease'}}/>
        <text x="50" y="55" textAnchor="middle" fill="#13140F" fontSize="17" fontFamily="Fraunces" fontStyle="italic">{live}%</text>
      </svg>
      <div>
        <div style={{fontSize:12,color:'var(--ink-dim)'}}>yielded to pedestrians</div>
        <div className="delta-good" style={{marginTop:4}}>↑ 12% since install</div>
      </div>
    </div>
  );
}

    </div>
    <div class="tp-row">
      <label>Logo size <span class="v" id="v-logo">${TW.logoSize}px</span></label>
      <input type="range" id="t-logo" min="24" max="64" step="1" value="${TW.logoSize}"/>
    </div>
    <div class="tp-row">
      <label>Wordmark size <span class="v" id="v-brand">${TW.brandSize}px</span></label>
      <input type="range" id="t-brand" min="14" max="28" step="1" value="${TW.brandSize}"/>
    </div>
    <div class="tp-row">
      <label>Mark ↔ wordmark gap <span class="v" id="v-gap">${TW.brandGap}px</span></label>
      <input type="range" id="t-gap" min="6" max="20" step="1" value="${TW.brandGap}"/>
    </div>
    <div class="tp-row">
      <label>Accent — forest green</label>
      <input type="color" id="t-green" value="${TW.accentGreen}"/>
    </div>
    <div class="tp-row">
      <label>Page background</label>
      <input type="color" id="t-bg" value="${TW.pageBg}"/>
    </div>
    <button class="tp-reset" id="t-reset">Reset to defaults</button>
  `;
  document.body.appendChild(el);

  const bind = (id, key, unit, prop) => {
    const input = el.querySelector('#t-' + id);
    const vEl = el.querySelector('#v-' + id);
    input.addEventListener('input', () => {
      const v = input.type === 'range' ? Number(input.value) : input.value;
      TW[key] = v;
      if (vEl) vEl.textContent = v + (unit || '');
      applyTweaks();
      try { window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [key]: v } }, '*'); } catch(e){}
    });
  };
  bind('logo', 'logoSize', 'px');
  bind('brand', 'brandSize', 'px');
  bind('gap', 'brandGap', 'px');
  bind('green', 'accentGreen');
  bind('bg', 'pageBg');

  el.querySelector('#t-reset').addEventListener('click', () => {
    Object.assign(TW, TWEAK_DEFAULTS);
    el.querySelector('#t-logo').value = TW.logoSize;
    el.querySelector('#v-logo').textContent = TW.logoSize + 'px';
    el.querySelector('#t-brand').value = TW.brandSize;
    el.querySelector('#v-brand').textContent = TW.brandSize + 'px';
    el.querySelector('#t-gap').value = TW.brandGap;
    el.querySelector('#v-gap').textContent = TW.brandGap + 'px';
    el.querySelector('#t-green').value = TW.accentGreen;
    el.querySelector('#t-bg').value = TW.pageBg;
    applyTweaks();
    try { window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { ...TWEAK_DEFAULTS } }, '*'); } catch(e){}
  });
}

// Listener MUST be registered before announcing availability.
window.addEventListener('message', (e) => {
  const t = e.data && e.data.type;
  if (t === '__activate_edit_mode') {
    buildPanel();
    const p = document.getElementById('tweak-panel');
    if (p) p.classList.add('open');
    panelOpen = true;
  } else if (t === '__deactivate_edit_mode') {
    const p = document.getElementById('tweak-panel');
    if (p) p.classList.remove('open');
    panelOpen = false;
  }
});

// Announce availability after listener is live.
try { window.parent.postMessage({ type: '__edit_mode_available' }, '*'); } catch(e){}
</script>
</body>
</html>
